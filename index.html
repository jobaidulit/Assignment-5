<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--tailwind-->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!--daisy ui-->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Issue Tracker Login</title>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-80 w-11/12 mx-auto">
    <img class="ml-18" src="assets/github-logo.png">

<h1 class="text-2xl font-bold text-center mb-2">GitHub Issues Tracker</h1>
<p class="text-center text-gray-500 mb-6">Sign in to manage your issues</p>
<label for="username">Username</label>
<input id="username" class="w-full p-2 rounded mb-3" placeholder="Enter Username">
<label for="password">Password</label>
<input id="password" type="password" class="w-full p-2 rounded mb-3" placeholder="Enter Password">

<button onclick="login()" class="w-full bg-[#4a00ff] text-white p-2 rounded cursor-pointer">
Sign In
</button>

<p class="text-xs text-gray-500 text-center mt-3">
Demo: admin / admin123
</p>

</div>

<script src="script/login.js"></script>

</body>
</html>
